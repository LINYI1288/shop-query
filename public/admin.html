<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  h1 { font-size: 20px; color: #222; margin-bottom: 24px; text-align: center; }
  input[type=password], input[type=file] {
    width: 100%; padding: 10px 14px;
    border: 1px solid #ddd; border-radius: 8px;
    font-size: 15px; outline: none; margin-bottom: 12px;
  }
  input[type=password]:focus { border-color: #4a90e2; }
  button {
    width: 100%; padding: 11px;
    background: #52c41a; color: #fff;
    border: none; border-radius: 8px;
    font-size: 15px; cursor: pointer;
  }
  button:hover { background: #3a9912; }
  #msg { font-size: 14px; margin-top: 12px; text-align: center; }
  #upload-area { display: none; margin-top: 8px; }
</style>
</head>
<body>
<div class="card">
  <h1>数据更新</h1>
  <div id="login-area">
    <input type="password" id="pwd" placeholder="请输入管理员密码" />
    <button onclick="login()">登录</button>
  </div>
  <div id="upload-area">
    <input type="file" id="excel-file" accept=".xlsx,.xls" />
    <button onclick="uploadFile()">上传更新数据</button>
  </div>
  <div id="msg"></div>
</div>
<script>
  document.getElementById('pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function login() {
    const pwd = document.getElementById('pwd').value;
    const msg = document.getElementById('msg');
    if (pwd === 'QCCJHM') {
      document.getElementById('login-area').style.display = 'none';
      document.getElementById('upload-area').style.display = 'block';
      msg.textContent = '';
    } else {
      msg.style.color = '#e05c2a';
      msg.textContent = '密码错误';
    }
  }

  async function uploadFile() {
    const file = document.getElementById('excel-file').files[0];
    const msg = document.getElementById('msg');
    if (!file) { msg.style.color='#e05c2a'; msg.textContent='请先选择文件'; return; }
    const fd = new FormData();
    fd.append('file', file);
    msg.style.color='#888'; msg.textContent='上传中...';
    try {
      const res = await fetch('/upload', { method: 'POST', body: fd });
      const json = await res.json();
      if (json.success) {
        msg.style.color='#52c41a';
        msg.textContent = `更新成功，共 ${json.count} 条记录`;
      } else {
        msg.style.color='#e05c2a'; msg.textContent='更新失败：' + json.error;
      }
    } catch { msg.style.color='#e05c2a'; msg.textContent='上传失败，请重试'; }
  }
</script>
</body>
</html>
